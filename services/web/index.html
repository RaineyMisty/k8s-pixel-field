<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>PixelField</title>
  <style>
    body {
      margin: 0;
      background: radial-gradient(circle at top, #141821 0%, #090b10 70%);
      color: #d6dae6;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
    }

    #status {
      position: fixed;
      top: 8px;
      left: 10px;
      z-index: 10;
      background: rgba(9, 11, 16, 0.75);
      border: 1px solid #2b3242;
      border-radius: 6px;
      padding: 6px 8px;
      font-size: 12px;
      line-height: 1.3;
      backdrop-filter: blur(2px);
      white-space: pre;
    }

    /* Coloured dot shows WebSocket connection state */
    #live-dot {
      display: inline-block;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #444;
      margin-right: 5px;
      vertical-align: middle;
      transition: background 0.3s;
    }
    #live-dot.connected    { background: #4caf50; }
    #live-dot.reconnecting { background: #f4a430; }
    #live-dot.error        { background: #c0392b; }

    #field {
      display: grid;
      gap: 1px;
      padding: 44px 16px 16px;
    }

    .pixel {
      width: 18px;
      height: 18px;
      background: #1f2531;
      border: 1px solid #3d4557;
      box-sizing: border-box;
    }

    /* Brief flash when a remote update arrives */
    @keyframes remote-flash {
      0%   { outline: 2px solid rgba(255, 255, 255, 0.8); }
      100% { outline: 2px solid rgba(255, 255, 255, 0); }
    }
    .pixel.remote-updated {
      animation: remote-flash 0.4s ease-out forwards;
    }
  </style>
</head>
<body>
  <div id="status"><span id="live-dot"></span>Initializing...</div>
  <div id="field"></div>

  <script>
    const CELL_SIZE     = 18;
    const GAP           = 1;
    const FIELD_PADDING = 16;

    // ── API / WS base URLs ────────────────────────────────────────────────────

    function resolveApiBase() {
      if (window.location.protocol === "file:") return "http://127.0.0.1:8080";
      const host = window.location.hostname || "127.0.0.1";
      return `${window.location.protocol}//${host}:8080`;
    }

    function resolveWsBase() {
      if (window.location.protocol === "file:") return "ws://127.0.0.1:8080";
      const host     = window.location.hostname || "127.0.0.1";
      const wsScheme = window.location.protocol === "https:" ? "wss:" : "ws:";
      return `${wsScheme}//${host}:8080`;
    }

    const API_BASE = window.PIXEL_API_URL || resolveApiBase();
    const WS_BASE  = window.PIXEL_WS_URL  || resolveWsBase();

    // ── Grid state ────────────────────────────────────────────────────────────

    let WIDTH = 0;
    let HEIGHT = 0;
    let resizeTimer = null;

    const colors = [
      "#171717",  // base black
      // The Starry Night 2 — Van Gogh
      "#f8e9a6",
      "#ffd84d",
      "#f4b430",
      "#3959bf",
      "#6c99ea",
      "#afcef3",
    ];

    const field             = document.getElementById("field");
    const statusEl          = document.getElementById("status");
    const liveDot           = document.getElementById("live-dot");
    const cellsByCoordinate = new Map();

    // ── Status helpers ────────────────────────────────────────────────────────

    function setStatus(message, isError = false) {
      while (statusEl.childNodes.length > 1) statusEl.removeChild(statusEl.lastChild);
      statusEl.appendChild(document.createTextNode(message));
      statusEl.style.borderColor = isError ? "#7a2d2d" : "#2b3242";
      statusEl.style.color       = isError ? "#ffb6b6" : "#d6dae6";
    }

    function setLiveDot(state) { // 'connected' | 'reconnecting' | 'error' | ''
      liveDot.className = state;
    }

    document.addEventListener("contextmenu", (e) => e.preventDefault());

    // ── Cell helpers ──────────────────────────────────────────────────────────

    function updateGridSize() {
      const padding = FIELD_PADDING * 2;
      WIDTH  = Math.floor((window.innerWidth  - padding) / (CELL_SIZE + GAP));
      HEIGHT = Math.floor((window.innerHeight - padding) / (CELL_SIZE + GAP));
      field.style.gridTemplateColumns = `repeat(${WIDTH}, ${CELL_SIZE}px)`;
      field.style.gridTemplateRows    = `repeat(${HEIGHT}, ${CELL_SIZE}px)`;
    }

    function coordinateKey(x, y) { return `${x},${y}`; }

    function changeColor(cell, direction) {
      let index = Number(cell.dataset.colorIndex);
      index = (index + direction + colors.length) % colors.length;
      cell.dataset.colorIndex = String(index);
      cell.style.background   = colors[index];
      return index;
    }

    function setCellColor(cell, colorIndex) {
      const bounded = ((colorIndex % colors.length) + colors.length) % colors.length;
      cell.dataset.colorIndex = String(bounded);
      cell.style.background   = colors[bounded];
    }

    // ── Remote pixel flash ────────────────────────────────────────────────────

    function applyRemotePixel(pixel) {
      const cell = cellsByCoordinate.get(coordinateKey(pixel.x, pixel.y));
      if (!cell) return; // outside current viewport — ignore

      setCellColor(cell, Number(pixel.colorIndex));

      // Restart flash animation even if it was already running.
      cell.classList.remove("remote-updated");
      void cell.offsetWidth; // force reflow
      cell.classList.add("remote-updated");
    }

    // ── WebSocket ─────────────────────────────────────────────────────────────
    //
    // Message types (client → server):
    //   { type: "pixel_update", x, y, colorIndex }
    //
    // Message types (server → client):
    //   { type: "pixel_update", x, y, colorIndex }  ← broadcast from another user
    //   { type: "pixel_ack",    x, y, colorIndex }  ← save confirmed for our own paint
    //   { type: "error",        message }            ← validation failure

    let ws = null;
    let wsRetryDelay = 1000; // exponential back-off, capped at 30 s
    let wsRetryTimer = null;

    // Queue of pending pixel saves while the socket is not yet open.
    // Each entry: { x, y, colorIndex, cell, prevIndex }
    const pendingQueue = [];

    function flushPendingQueue() {
      while (pendingQueue.length > 0) {
        const item = pendingQueue.shift();
        sendPixelUpdate(item.x, item.y, item.colorIndex);
      }
    }

    function connectWs() {
      setLiveDot("reconnecting");

      const socket = new WebSocket(`${WS_BASE}/ws`);
      ws = socket;

      socket.addEventListener("open", () => {
        setLiveDot("connected");
        wsRetryDelay = 1000;
        setStatus(`Live  ·  ${API_BASE}`, false);
        console.log("WebSocket connected");
        flushPendingQueue();
      });

      socket.addEventListener("message", (event) => {
        const msg = (() => { try { return JSON.parse(event.data); } catch { return null; } })();
        if (!msg) return;

        if (msg.type === "pixel_update") {
          // A different user painted a pixel — apply it.
          applyRemotePixel(msg);
        } else if (msg.type === "pixel_ack") {
          // Our own save was confirmed — nothing extra to do
          // (we already applied the color optimistically on click).
          setStatus(`Saved (${msg.x},${msg.y})  ·  ${API_BASE}`, false);
        } else if (msg.type === "error") {
          setStatus(`Server error: ${msg.message}  ·  ${API_BASE}`, true);
          console.error("WS server error:", msg.message);
        }
      });

      socket.addEventListener("close", () => {
        ws = null;
        setLiveDot("reconnecting");
        console.warn(`WebSocket closed — retrying in ${wsRetryDelay} ms`);

        clearTimeout(wsRetryTimer);
        wsRetryTimer = setTimeout(() => {
          wsRetryDelay = Math.min(wsRetryDelay * 2, 30_000);
          connectWs();
        }, wsRetryDelay);
      });

      socket.addEventListener("error", () => {
        // 'close' fires right after 'error', so reconnect logic lives there.
        setLiveDot("error");
        console.error("WebSocket error");
      });
    }

    /**
     * Send a pixel paint over WebSocket.
     * If the socket is not open yet, queue the update to send once connected.
     */
    function sendPixelUpdate(x, y, colorIndex) {
      const msg = JSON.stringify({ type: "pixel_update", x, y, colorIndex });

      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(msg);
      } else {
        pendingQueue.push({ x, y, colorIndex });
      }
    }

    // ── HTTP: initial pixel load ──────────────────────────────────────────────

    async function loadPixels() {
      try {
        const res = await fetch(`${API_BASE}/pixels?width=${WIDTH}&height=${HEIGHT}`);
        if (!res.ok) throw new Error(`GET /pixels failed: ${res.status}`);

        const payload = await res.json();
        const pixels  = Array.isArray(payload.pixels) ? payload.pixels : [];

        for (const pixel of pixels) {
          const cell = cellsByCoordinate.get(coordinateKey(pixel.x, pixel.y));
          if (cell) setCellColor(cell, Number(pixel.colorIndex));
        }
      } catch (error) {
        setStatus(`API offline (local drawing still works)  ·  ${API_BASE}`, true);
        console.error("Failed to load pixels:", error);
      }
    }

    // ── Render ────────────────────────────────────────────────────────────────

    async function render() {
      updateGridSize();
      field.innerHTML = "";
      cellsByCoordinate.clear();

      for (let y = 0; y < HEIGHT; y++) {
        for (let x = 0; x < WIDTH; x++) {
          const cell = document.createElement("div");
          cell.className      = "pixel";
          cell.dataset.colorIndex = "0";
          cell.style.background   = colors[0];
          cell.dataset.x = String(x);
          cell.dataset.y = String(y);

          cell.onmousedown = (event) => {
            if (event.button !== 0 && event.button !== 2) return;

            const direction = event.button === 0 ? +1 : -1;
            const prevIndex = Number(cell.dataset.colorIndex);
            const newIndex  = changeColor(cell, direction); // optimistic update

            // Send over WebSocket — server will ack or error back.
            sendPixelUpdate(x, y, newIndex);

            // If the WS is down, revert the optimistic update after a timeout
            // so the user knows the save is uncertain.
            if (!ws || ws.readyState !== WebSocket.OPEN) {
              setStatus(`WS offline — queued (${x},${y})  ·  ${API_BASE}`, true);
            }
          };

          cellsByCoordinate.set(coordinateKey(x, y), cell);
          field.appendChild(cell);
        }
      }

      await loadPixels();
    }

    window.addEventListener("resize", () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(() => render(), 120);
    });

    render();
    connectWs();
  </script>
</body>
</html>
