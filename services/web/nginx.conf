server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri /index.html;
    }

    # Browser calls /health and /pixels on the same host.
    # Nginx forwards those API calls to the Kubernetes API service.
    location = /health {
        proxy_pass http://pixel-api-service:8080/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /pixels {
        proxy_pass http://pixel-api-service:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
