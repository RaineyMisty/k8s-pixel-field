apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: pixelfield-ingress
  namespace: pixelfield
spec:
  rules:
    - host: pixelfield.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web-service
                port:
                  number: 80
